<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المحاسب الذكي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#00BCD4;--brand-d:#0891B2;--brand-xl:#E0F7FA;
  --dark:#111827;--darker:#04070d;
  --bg:#F1F5F9;--card:#fff;
  --text:#0f172a;--muted:#64748b;
  --green:#10b981;--green-l:#ecfdf5;
  --red:#ef4444;--red-l:#fef2f2;
  --amber:#f59e0b;--amber-l:#fffbeb;
  --purple:#8b5cf6;--purple-l:#f3e8ff;
  --border:#e2e8f0;
  --r:14px;--rm:10px;--rs:8px;
  --sh:0 1px 3px rgb(15 23 42/.06);
  --sh-md:0 4px 12px -4px rgb(15 23 42/.1);
  --sh-lg:0 12px 32px -8px rgb(15 23 42/.2);
  --grad-brand:linear-gradient(135deg,#00BCD4,#0369A1);
  --tr:all .2s ease;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
button,input,select{font-family:inherit}

/* ── LOGIN ── */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%)}
.lcard{background:#fff;padding:40px 32px;border-radius:20px;box-shadow:var(--sh-lg);width:100%;max-width:400px}
.lcard-logo{text-align:center;margin-bottom:24px}
.lcard-logo svg{width:48px;height:48px}
.lcard-logo h2{font-size:20px;font-weight:800;margin-top:10px}
.lcard-logo p{font-size:12px;color:var(--muted);margin-top:2px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:700;margin-bottom:5px}
.fg input{width:100%;padding:11px 14px;border-radius:var(--rm);border:1.5px solid var(--border);font-size:13px;outline:none;transition:var(--tr);background:#f8fafc}
.fg input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-xl)}
.btn{width:100%;padding:12px;background:var(--grad-brand);color:#fff;border:none;border-radius:var(--rm);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:var(--tr)}
.btn:hover{opacity:.92;transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.lerr{display:none;background:var(--red-l);color:var(--red);border-radius:var(--rs);padding:10px;font-size:12px;font-weight:600;text-align:center;margin-bottom:12px}

/* ── APP LAYOUT ── */
#appPage{display:none;min-height:100vh}
.app-header{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:32px;height:32px;background:var(--grad-brand);border-radius:8px;display:flex;align-items:center;justify-content:center}
.hdr-logo svg{width:16px;height:16px;color:#fff}
.hdr-info h1{font-size:13px;font-weight:700}
.hdr-info p{font-size:10px;color:var(--muted)}
.hdr-right{display:flex;align-items:center;gap:6px}
.hdr-btn{background:#f8fafc;border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:var(--tr)}
.hdr-btn:hover{background:var(--brand-xl);border-color:var(--brand)}
.hdr-btn svg{width:13px;height:13px}

.app-body{display:flex;min-height:calc(100vh - 56px)}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:#fff;border-left:1px solid var(--border);padding:16px 12px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;flex-shrink:0}
.sb-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding:0 8px}
.sb-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--rm);cursor:pointer;transition:var(--tr);margin-bottom:4px;font-size:12px;font-weight:600;color:var(--text)}
.sb-item:hover{background:#f8fafc}
.sb-item.active{background:var(--brand-xl);color:var(--brand-d);border:1px solid rgba(0,188,212,.2)}
.sb-item svg{width:14px;height:14px;flex-shrink:0}
.sb-item .sb-sales{margin-right:auto;font-size:10px;color:var(--muted);font-weight:500}
.sb-item.active .sb-sales{color:var(--brand-d)}
.sb-all{border:1px dashed var(--border);background:#fafafa}
.sb-all.active{background:var(--grad-brand);color:#fff;border-style:solid;border-color:transparent}
.sb-all.active .sb-sales{color:rgba(255,255,255,.8)}
.sb-status{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ── MAIN ── */
.main{flex:1;padding:20px;max-width:1100px}

/* tabs */
.tabs{display:flex;background:#fff;border:1px solid var(--border);border-radius:99px;padding:4px;gap:2px;margin-bottom:16px;width:fit-content;box-shadow:var(--sh)}
.tab{padding:8px 18px;border-radius:99px;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:var(--tr);white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{background:var(--grad-brand);color:#fff}

/* metrics */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:16px}
.mc{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh);transition:var(--tr)}
.mc:hover{box-shadow:var(--sh-md);border-color:rgba(0,188,212,.2)}
.mc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mc-label{font-size:11px;font-weight:600;color:var(--muted)}
.mc-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.mc-ico svg{width:15px;height:15px}
.mc-s .mc-ico{background:var(--green-l);color:var(--green)}
.mc-r .mc-ico{background:var(--red-l);color:var(--red)}
.mc-n .mc-ico{background:var(--brand-xl);color:var(--brand-d)}
.mc-p .mc-ico{background:var(--amber-l);color:var(--amber)}
.mc-i .mc-ico{background:var(--purple-l);color:var(--purple)}
.mc-val{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
.mc-foot{font-size:10px;color:var(--muted);margin-top:6px}

/* bottom panels */
.row2{display:grid;grid-template-columns:1fr 1.5fr;gap:14px;margin-bottom:16px}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
.panel-title{font-size:12px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.panel-title svg{width:14px;height:14px;color:var(--brand)}

/* payments */
.pay-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--border);font-size:12px}
.pay-item:last-child{border:none}
.pay-left{display:flex;align-items:center;gap:8px;font-weight:600}
.pay-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pay-dot svg{width:11px;height:11px;color:#fff}
.pay-val{font-weight:700;font-variant-numeric:tabular-nums}

/* recent */
.rec-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f8fafc;border-radius:var(--rs);margin-bottom:5px;font-size:11px;transition:var(--tr)}
.rec-item:hover{background:var(--brand-xl)}
.rec-num{font-weight:700}
.rec-date{font-size:10px;color:var(--muted);margin-top:1px}
.rec-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;margin-left:4px}
.rec-badge-s{background:var(--green-l);color:var(--green)}
.rec-badge-r{background:var(--red-l);color:var(--red)}
.rec-badge-p{background:var(--amber-l);color:var(--amber)}
.rec-amt{font-weight:700;font-variant-numeric:tabular-nums}
.clr-s{color:var(--green)}.clr-r{color:var(--red)}.clr-p{color:var(--amber)}
.no-data{font-size:11px;color:var(--muted);text-align:center;padding:12px}

/* ── TAX QUARTER SECTION ── */
.tax-section{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:16px;box-shadow:var(--sh)}
.tax-head{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.tax-head svg{width:15px;height:15px;color:var(--brand)}
.tax-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.tax-node{text-align:center;padding:12px;background:#f8fafc;border-radius:var(--rm);border:1px solid var(--border)}
.tax-lbl{font-size:10px;color:var(--muted);margin-bottom:4px}
.tax-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.tax-val.due{color:var(--brand-d);font-size:18px}
.tax-foot{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.prog-bg{flex:1;background:var(--bg);height:6px;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--grad-brand);border-radius:99px;transition:width .5s}
.prog-lbl{font-size:10px;color:var(--muted);margin-top:4px}
.btn-print{background:var(--grad-brand);color:#fff;border:none;padding:9px 16px;border-radius:var(--rs);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:var(--tr);white-space:nowrap}
.btn-print:hover{opacity:.9}
.btn-print svg{width:12px;height:12px}

/* branch compare */
.branch-cmp{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:var(--sh)}
.cmp-title{font-size:12px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.cmp-title svg{width:14px;height:14px;color:var(--brand)}
.cmp-row{margin-bottom:10px}
.cmp-label{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:4px}
.cmp-bar{height:7px;background:var(--bg);border-radius:99px;overflow:hidden}
.cmp-fill{height:100%;border-radius:99px;transition:width .6s}

/* sync bar */
.sync-bar{background:#fff;border:1px solid var(--border);border-radius:var(--rm);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;box-shadow:var(--sh);font-size:11px;color:var(--muted)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px}
.sync-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:var(--rs);font-size:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}
.sync-btn:hover{border-color:var(--brand);color:var(--brand-d)}
.sync-btn svg{width:11px;height:11px}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .2s;padding:20px}
.modal.on{opacity:1;pointer-events:auto}
.mbox{background:#fff;width:100%;max-width:400px;border-radius:16px;box-shadow:var(--sh-lg);padding:24px}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mhead h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.mhead h3 svg{width:15px;height:15px;color:var(--brand)}
.mclose{background:#f1f5f9;border:none;width:28px;height:28px;border-radius:8px;font-size:16px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.mclose:hover{background:var(--red-l);color:var(--red)}
.merr{display:none;background:var(--red-l);color:var(--red);border-radius:var(--rs);padding:8px;font-size:11px;font-weight:600;margin-bottom:10px;text-align:center}

/* ── PRINT ── */
#printDoc{display:none}
@media print{
  body{background:#fff!important}
  #appPage,#loginPage,.modal{display:none!important}
  #printDoc{display:block!important}
  @page{size:A4;margin:15mm}
  .print-wrap{max-width:210mm;margin:0 auto;font-family:'Cairo',sans-serif;color:#0f172a;direction:rtl}
  .print-header{text-align:center;border-bottom:2px solid #00BCD4;padding-bottom:12px;margin-bottom:16px}
  .print-header h1{font-size:18px;font-weight:800;margin-bottom:4px}
  .print-header p{font-size:11px;color:#64748b}
  .print-table{width:100%;border-collapse:collapse;margin-bottom:16px}
  .print-table th,.print-table td{padding:8px 12px;border:1px solid #e2e8f0;font-size:12px;text-align:right}
  .print-table th{background:#f1f5f9;font-weight:700}
  .print-table td{font-variant-numeric:tabular-nums}
  .print-total{font-size:14px;font-weight:800;color:#0891B2;text-align:center;margin-top:12px}
  .print-footer{text-align:center;font-size:9px;color:#94a3b8;margin-top:24px;border-top:1px solid #e2e8f0;padding-top:8px}
}

/* ── MOBILE ── */
@media(max-width:768px){
  .app-header{padding:0 12px;height:50px}
  .hdr-info h1{font-size:11px}
  .hdr-info p{font-size:9px}
  .hdr-btn{padding:6px 8px;font-size:10px}
  .hdr-btn span{display:none}
  .app-body{flex-direction:column}
  .sidebar{width:100%;position:relative;top:0;height:auto;border-left:none;border-bottom:1px solid var(--border);padding:10px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .sb-title{display:none}
  .sb-item{margin-bottom:0;padding:7px 10px;font-size:11px}
  .sb-all{border:none;background:transparent}
  .sb-all .sb-item{border:1px dashed var(--border);border-radius:var(--rm)}
  .sb-all.active .sb-item{border-style:solid;border-color:transparent}
  .main{padding:12px}
  .tabs{width:100%;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .tab{flex-shrink:0}
  .mgrid{grid-template-columns:repeat(2,1fr);gap:8px}
  .mc-val{font-size:16px}
  .row2{grid-template-columns:1fr}
  .tax-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ══════════ LOGIN PAGE ══════════ -->
<div id="loginPage">
  <div class="lcard">
    <div class="lcard-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00BCD4" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <h2>المحاسب الذكي</h2>
      <p>نظام إدارة المبيعات والفواتير</p>
    </div>
    <div class="fg">
      <label>اسم المستخدم</label>
      <input type="text" id="loginUser" placeholder="أدخل اسم المستخدم" autocomplete="username">
    </div>
    <div class="fg">
      <label>كلمة المرور</label>
      <input type="password" id="loginPass" placeholder="أدخل كلمة المرور" autocomplete="current-password">
    </div>
    <div class="lerr" id="loginErr">بيانات الدخول غير صحيحة</div>
    <button class="btn" id="loginBtn" onclick="doLogin()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      تسجيل الدخول
    </button>
  </div>
</div>

<!-- ══════════ APP PAGE ══════════ -->
<div id="appPage">
  <div class="app-header">
    <div class="hdr-left">
      <div class="hdr-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <div class="hdr-info">
        <h1 id="hdrStore">—</h1>
        <p id="hdrTax">—</p>
      </div>
    </div>
    <div class="hdr-right">
      <button class="hdr-btn" onclick="openSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>إعدادات</span>
      </button>
      <button class="hdr-btn" onclick="doLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        <span>خروج</span>
      </button>
    </div>
  </div>

  <div class="app-body">
    <div class="sidebar" id="sidebar">
      <div class="sb-title">الفروع</div>
      <div id="branchList"></div>
      <div class="sb-all" id="sbAllWrap">
        <div class="sb-item" id="sbAll" onclick="selectBranch(null)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          جميع الفروع
          <span class="sb-sales" id="sbAllSales">—</span>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="sync-bar">
        <div><span class="sync-dot"></span> <span id="syncInfo">—</span></div>
        <button class="sync-btn" onclick="refreshData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          تحديث
        </button>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('today',this)">اليوم</button>
        <button class="tab" onclick="switchTab('yesterday',this)">أمس</button>
        <button class="tab" onclick="switchTab('month',this)">الشهر</button>
        <button class="tab" onclick="switchTab('quarter',this)">الربع</button>
      </div>

      <div id="metricsArea"></div>

      <div class="row2" id="bottomSection">
        <div class="panel">
          <div class="panel-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            قنوات الدفع
          </div>
          <div id="payArea"></div>
        </div>
        <div class="panel">
          <div class="panel-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            آخر العمليات
          </div>
          <div id="recentArea"></div>
        </div>
      </div>

      <div class="tax-section" id="taxSection">
        <div class="tax-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          الإقرار الضريبي — <span id="taxPeriodLbl">الربع الحالي</span>
        </div>
        <div class="tax-grid">
          <div class="tax-node">
            <div class="tax-lbl">ضريبة المبيعات</div>
            <div class="tax-val" id="tSales">—</div>
          </div>
          <div class="tax-node">
            <div class="tax-lbl">ضريبة المشتريات</div>
            <div class="tax-val" id="tPur">—</div>
          </div>
          <div class="tax-node">
            <div class="tax-lbl">المستحق للهيئة</div>
            <div class="tax-val due" id="tDue">—</div>
          </div>
        </div>
        <div class="tax-foot">
          <div style="flex:1">
            <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
            <div class="prog-lbl" id="progLbl">—</div>
          </div>
          <button class="btn-print" onclick="doPrint()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            طباعة الإقرار
          </button>
        </div>
      </div>

      <div class="branch-cmp" id="branchCmp" style="display:none">
        <div class="cmp-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          مقارنة الفروع
        </div>
        <div id="cmpRows"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ SETTINGS MODAL ══════════ -->
<div class="modal" id="settingsModal">
  <div class="mbox">
    <div class="mhead">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        الإعدادات
      </h3>
      <button class="mclose" onclick="hideModal('settingsModal')">&times;</button>
    </div>

    <div class="fg">
      <label>وقت إغلاق النشاط (ساعة 0-23)</label>
      <input type="number" id="setHour" min="0" max="23" value="0">
    </div>
    <button class="btn" onclick="saveCloseHour()" style="margin-bottom:16px">حفظ وقت الإغلاق</button>

    <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">
        كلمة المرور الحالية: <strong id="pwStatus">—</strong>
      </div>
      <div class="fg">
        <label>كلمة مرور جديدة (6 أحرف على الأقل)</label>
        <input type="password" id="pw1">
      </div>
      <div class="fg">
        <label>تأكيد كلمة المرور</label>
        <input type="password" id="pw2">
      </div>
      <div class="merr" id="pwErr"></div>
      <div class="msuc" id="pwSuc" style="display:none;background:var(--green-l);color:var(--green);border-radius:var(--rs);padding:8px;font-size:11px;font-weight:600;margin-bottom:10px;text-align:center"></div>
      <button class="btn" onclick="changePw()">تغيير كلمة المرور</button>
    </div>

    <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:14px">
      <button class="btn" onclick="openSupport()" style="background:linear-gradient(135deg,#25D366,#128C7E)">
        تواصل مع الدعم الفني
      </button>
    </div>
  </div>
</div>

<!-- ══════════ ONBOARD MODAL ══════════ -->
<div class="modal" id="onboardModal">
  <div class="mbox" style="text-align:center">
    <h3 style="justify-content:center;margin-bottom:8px">مرحباً بك!</h3>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px">حدد وقت إغلاق نشاطك التجاري</p>
    <div class="fg">
      <label>ساعة الإغلاق (0-23)</label>
      <input type="number" id="onboardHour" min="0" max="23" value="0">
    </div>
    <button class="btn" onclick="saveOnboard()">بدء الاستخدام</button>
  </div>
</div>

<!-- ══════════ PRINT DOCUMENT ══════════ -->
<div id="printDoc"></div>

<!-- ══════════ JAVASCRIPT ══════════ -->
<script>
/* ── STATE ── */
var TOKEN = '';
var STORE = '';
var TAX_NUM = '';
var BRANCHES = [];
var CURRENT_BRANCH = null;
var CLOSE_HOUR = 0;
var ONBOARDED = false;
var SUPPORT_WA = '';
var HAS_CUSTOM_PW = false;
var lastQuarterData = null;
var currentTab = 'today';

var API = '/api/portal';

/* ── HELPERS ── */
function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function showModal(id) { document.getElementById(id).classList.add('on'); }
function hideModal(id) { document.getElementById(id).classList.remove('on'); }

function apiHeaders() {
  var h = {'Content-Type': 'application/json'};
  if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
  return h;
}

function tenantParam() {
  return CURRENT_BRANCH ? '&tenant_id=' + encodeURIComponent(CURRENT_BRANCH) : '';
}

/* ── LOGIN ── */
function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  var errEl = document.getElementById('loginErr');
  var btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  if (!u || !p) { errEl.textContent = 'يرجى إدخال اسم المستخدم وكلمة المرور'; errEl.style.display = 'block'; return; }
  btn.disabled = true;
  btn.textContent = 'جاري الدخول...';

  fetch(API + '/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: u, password: p})
  })
  .then(function(r) {
    if (!r.ok) throw new Error('login failed');
    return r.json();
  })
  .then(function(d) {
    TOKEN = d.token;
    STORE = d.store_name || '';
    TAX_NUM = d.tax_number || '';
    CLOSE_HOUR = d.close_hour || 0;
    ONBOARDED = !!d.onboarded;
    SUPPORT_WA = d.support_wa || '';
    HAS_CUSTOM_PW = !!d.has_custom_password;
    BRANCHES = d.branches || [];

    document.getElementById('hdrStore').textContent = STORE;
    document.getElementById('hdrTax').textContent = 'الرقم الضريبي: ' + TAX_NUM;

    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').style.display = 'block';

    renderSidebar();
    selectBranch(null);

    if (!ONBOARDED) {
      showModal('onboardModal');
    }
  })
  .catch(function() {
    errEl.textContent = 'بيانات الدخول غير صحيحة';
    errEl.style.display = 'block';
  })
  .finally(function() {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> تسجيل الدخول';
  });
}

/* ── LOGOUT ── */
function doLogout() {
  TOKEN = '';
  STORE = '';
  TAX_NUM = '';
  BRANCHES = [];
  CURRENT_BRANCH = null;
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

/* ── SIDEBAR ── */
function renderSidebar() {
  var list = document.getElementById('branchList');
  var html = '';
  var totalSales = 0;
  for (var i = 0; i < BRANCHES.length; i++) {
    var b = BRANCHES[i];
    var sales = b.today_sales || 0;
    totalSales += sales;
    var dotColor = b.is_active ? 'var(--green)' : 'var(--muted)';
    html += '<div class="sb-item" data-branch="' + b.device_id + '" onclick="selectBranch(\'' + b.device_id + '\')">'
      + '<span class="sb-status" style="background:' + dotColor + '"></span>'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'
      + b.branch_name
      + '<span class="sb-sales">' + fmt(sales) + '</span>'
      + '</div>';
  }
  list.innerHTML = html;
  document.getElementById('sbAllSales').textContent = fmt(totalSales);
  updateSidebarActive();
}

function updateSidebarActive() {
  var items = document.querySelectorAll('#branchList .sb-item');
  for (var i = 0; i < items.length; i++) {
    var bid = items[i].getAttribute('data-branch');
    items[i].classList.toggle('active', bid === CURRENT_BRANCH);
  }
  document.getElementById('sbAllWrap').classList.toggle('active', CURRENT_BRANCH === null);
}

function selectBranch(deviceId) {
  CURRENT_BRANCH = deviceId;
  updateSidebarActive();
  refreshData();
}

/* ── TABS ── */
function switchTab(tab, el) {
  currentTab = tab;
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  if (el) el.classList.add('active');
  loadTabData();
}

/* ── DATA LOADING ── */
function refreshData() {
  loadTabData();
  loadQuarterData();
  loadSyncStatus();
  loadRecent();
}

function loadTabData() {
  if (currentTab === 'today') loadDay(0);
  else if (currentTab === 'yesterday') loadDay(-1);
  else if (currentTab === 'month') loadMonth();
  else if (currentTab === 'quarter') loadQuarterTab();
}

function loadDay(offset) {
  fetch(API + '/day?offset=' + offset + tenantParam(), {headers: apiHeaders()})
  .then(function(r) { return r.json(); })
  .then(function(d) {
    renderDayMetrics(d);
    renderPayments(d.payment_breakdown);
  })
  .catch(function() {});
}

function loadMonth() {
  fetch(API + '/month' + (CURRENT_BRANCH ? '?tenant_id=' + encodeURIComponent(CURRENT_BRANCH) : ''), {headers: apiHeaders()})
  .then(function(r) { return r.json(); })
  .then(function(d) {
    renderMonthMetrics(d);
    renderPayments(d.payment_breakdown);
    renderBranchCompare(d.branch_breakdown);
  })
  .catch(function() {});
}

function loadQuarterTab() {
  fetch(API + '/quarter' + (CURRENT_BRANCH ? '?tenant_id=' + encodeURIComponent(CURRENT_BRANCH) : ''), {headers: apiHeaders()})
  .then(function(r) { return r.json(); })
  .then(function(d) {
    renderQuarterMetrics(d);
    renderPayments(d.payment_breakdown);
    renderBranchCompare(d.branch_breakdown);
  })
  .catch(function() {});
}

function loadQuarterData() {
  fetch(API + '/quarter' + (CURRENT_BRANCH ? '?tenant_id=' + encodeURIComponent(CURRENT_BRANCH) : ''), {headers: apiHeaders()})
  .then(function(r) { return r.json(); })
  .then(function(d) {
    lastQuarterData = d;
    document.getElementById('tSales').textContent = fmt(d.tax_sales);
    document.getElementById('tPur').textContent = fmt(d.tax_purchases);
    document.getElementById('tDue').textContent = fmt(d.vat_due);
    document.getElementById('taxPeriodLbl').textContent = d.period_label || 'الربع الحالي';
    var prog = d.quarter_progress || 0;
    document.getElementById('progFill').style.width = prog + '%';
    document.getElementById('progLbl').textContent = 'تقدم الربع: ' + Math.round(prog) + '%' + (d.days_remaining ? ' — متبقي ' + d.days_remaining + ' يوم' : '');
  })
  .catch(function() {});
}

function loadSyncStatus() {
  fetch(API + '/sync-status' + (CURRENT_BRANCH ? '?tenant_id=' + encodeURIComponent(CURRENT_BRANCH) : ''), {headers: apiHeaders()})
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var info = 'آخر مستند: ' + (d.last_doc_date || '—') + ' | الفواتير: ' + (d.total_invoices || 0);
    if (d.devices) info += ' | الأجهزة: ' + d.devices;
    document.getElementById('syncInfo').textContent = info;
  })
  .catch(function() {});
}

function loadRecent() {
  fetch(API + '/recent?offset=0' + tenantParam(), {headers: apiHeaders()})
  .then(function(r) { return r.json(); })
  .then(function(d) { renderRecent(d); })
  .catch(function() {});
}

/* ── RENDERERS ── */
function renderDayMetrics(d) {
  var html = '<div class="mgrid">'
    + metricCard('mc-s', 'المبيعات', fmt(d.sales), (d.sales_count || 0) + ' فاتورة', salesIcon())
    + metricCard('mc-r', 'المرتجعات', fmt(d.refund), '', refundIcon())
    + metricCard('mc-n', 'صافي المبيعات', fmt(d.net_sales), '', netIcon())
    + metricCard('mc-p', 'المشتريات', fmt(d.purchases), (d.purchases_count || 0) + ' عملية', purchaseIcon())
    + metricCard('mc-r', 'مرتجع المخزون', fmt(d.stock_return), '', returnIcon())
    + metricCard('mc-i', 'صافي الدخل', fmt(d.net_income), '', incomeIcon())
    + '</div>';
  document.getElementById('metricsArea').innerHTML = html;
}

function renderMonthMetrics(d) {
  var html = '<div class="mgrid">'
    + metricCard('mc-s', 'المبيعات', fmt(d.sales), '', salesIcon())
    + metricCard('mc-r', 'المرتجعات', fmt(d.refund), '', refundIcon())
    + metricCard('mc-n', 'صافي المبيعات', fmt(d.net_sales), '', netIcon())
    + metricCard('mc-p', 'المشتريات', fmt(d.purchases), '', purchaseIcon())
    + metricCard('mc-r', 'مرتجع المخزون', fmt(d.stock_return), '', returnIcon())
    + '</div>';
  document.getElementById('metricsArea').innerHTML = html;
}

function renderQuarterMetrics(d) {
  var html = '<div class="mgrid">'
    + metricCard('mc-s', 'المبيعات', fmt(d.sales), '', salesIcon())
    + metricCard('mc-r', 'المرتجعات', fmt(d.refund), '', refundIcon())
    + metricCard('mc-n', 'صافي المبيعات', fmt(d.net_sales), '', netIcon())
    + metricCard('mc-p', 'المشتريات', fmt(d.purchases), '', purchaseIcon())
    + metricCard('mc-r', 'مرتجع المخزون', fmt(d.stock_return), '', returnIcon())
    + '</div>';
  document.getElementById('metricsArea').innerHTML = html;
}

function metricCard(cls, label, val, foot, ico) {
  return '<div class="mc ' + cls + '">'
    + '<div class="mc-head"><span class="mc-label">' + label + '</span><div class="mc-ico">' + ico + '</div></div>'
    + '<div class="mc-val">' + val + '</div>'
    + (foot ? '<div class="mc-foot">' + foot + '</div>' : '')
    + '</div>';
}

function salesIcon() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>'; }
function refundIcon() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>'; }
function netIcon() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>'; }
function purchaseIcon() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>'; }
function returnIcon() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>'; }
function incomeIcon() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>'; }

function renderPayments(pb) {
  var area = document.getElementById('payArea');
  if (!pb || !Object.keys(pb).length) { area.innerHTML = '<div class="no-data">لا توجد بيانات</div>'; return; }
  var colors = {'cash':'#10b981','card':'#8b5cf6','transfer':'#00BCD4','credit':'#f59e0b'};
  var labels = {'cash':'نقدي','card':'بطاقة','transfer':'تحويل','credit':'آجل'};
  var html = '';
  var keys = Object.keys(pb);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var c = colors[k] || '#64748b';
    var lbl = labels[k] || k;
    html += '<div class="pay-item">'
      + '<div class="pay-left"><div class="pay-dot" style="background:' + c + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>' + lbl + '</div>'
      + '<div class="pay-val">' + fmt(pb[k]) + '</div>'
      + '</div>';
  }
  area.innerHTML = html;
}

function renderRecent(d) {
  var area = document.getElementById('recentArea');
  var items = [];
  if (d.sales) for (var i = 0; i < d.sales.length; i++) items.push({type:'s', num: d.sales[i].invoice_number, date: d.sales[i].invoice_date, amt: d.sales[i].total_with_tax, method: d.sales[i].payment_method});
  if (d.refunds) for (var i = 0; i < d.refunds.length; i++) items.push({type:'r', num: d.refunds[i].invoice_number, date: d.refunds[i].invoice_date, amt: d.refunds[i].total_with_tax});
  if (d.purchases) for (var i = 0; i < d.purchases.length; i++) items.push({type:'p', num: d.purchases[i].invoice_number, date: d.purchases[i].invoice_date, amt: d.purchases[i].total_with_tax});
  if (d.stock_returns) for (var i = 0; i < d.stock_returns.length; i++) items.push({type:'p', num: d.stock_returns[i].invoice_number, date: d.stock_returns[i].invoice_date, amt: d.stock_returns[i].total_with_tax});

  if (!items.length) { area.innerHTML = '<div class="no-data">لا توجد عمليات حديثة</div>'; return; }

  items.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
  items = items.slice(0, 10);

  var html = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var badgeCls = it.type === 's' ? 'rec-badge-s' : (it.type === 'r' ? 'rec-badge-r' : 'rec-badge-p');
    var badgeTxt = it.type === 's' ? 'بيع' : (it.type === 'r' ? 'مرتجع' : 'مشتري');
    var clr = it.type === 's' ? 'clr-s' : (it.type === 'r' ? 'clr-r' : 'clr-p');
    html += '<div class="rec-item">'
      + '<div><div class="rec-num">' + (it.num || '—') + '<span class="rec-badge ' + badgeCls + '">' + badgeTxt + '</span></div>'
      + '<div class="rec-date">' + (it.date || '') + '</div></div>'
      + '<div class="rec-amt ' + clr + '">' + fmt(it.amt) + '</div>'
      + '</div>';
  }
  area.innerHTML = html;
}

function renderBranchCompare(bb) {
  var cmp = document.getElementById('branchCmp');
  var rows = document.getElementById('cmpRows');
  if (!bb || !bb.length || CURRENT_BRANCH !== null) { cmp.style.display = 'none'; return; }
  cmp.style.display = 'block';
  var max = 0;
  for (var i = 0; i < bb.length; i++) if (bb[i].total > max) max = bb[i].total;
  var colors = ['#00BCD4','#10b981','#8b5cf6','#f59e0b','#ef4444','#0891B2'];
  var html = '';
  for (var i = 0; i < bb.length; i++) {
    var pct = max > 0 ? (bb[i].total / max * 100) : 0;
    var c = colors[i % colors.length];
    html += '<div class="cmp-row">'
      + '<div class="cmp-label"><span>' + bb[i].branch_name + '</span><span>' + fmt(bb[i].total) + '</span></div>'
      + '<div class="cmp-bar"><div class="cmp-fill" style="width:' + pct + '%;background:' + c + '"></div></div>'
      + '</div>';
  }
  rows.innerHTML = html;
}

/* ── SETTINGS ── */
function openSettings() {
  document.getElementById('setHour').value = CLOSE_HOUR;
  document.getElementById('pwStatus').textContent = HAS_CUSTOM_PW ? 'كلمة مرور مخصصة' : 'رقم الجوال';
  document.getElementById('pw1').value = '';
  document.getElementById('pw2').value = '';
  document.getElementById('pwErr').style.display = 'none';
  document.getElementById('pwSuc').style.display = 'none';
  showModal('settingsModal');
}

function saveCloseHour() {
  var h = parseInt(document.getElementById('setHour').value);
  if (isNaN(h) || h < 0 || h > 23) { alert('يرجى إدخال رقم صحيح بين 0 و 23'); return; }
  fetch(API + '/settings/close-hour', {
    method: 'POST',
    headers: apiHeaders(),
    body: JSON.stringify({close_hour: h})
  })
  .then(function(r) {
    if (!r.ok) throw new Error('fail');
    CLOSE_HOUR = h;
    hideModal('settingsModal');
  })
  .catch(function() { alert('حدث خطأ في الحفظ'); });
}

function changePw() {
  var p1 = document.getElementById('pw1').value;
  var p2 = document.getElementById('pw2').value;
  var errEl = document.getElementById('pwErr');
  var sucEl = document.getElementById('pwSuc');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (!p1 || p1.length < 6) { errEl.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل'; errEl.style.display = 'block'; return; }
  if (p1 !== p2) { errEl.textContent = 'كلمتا المرور غير متطابقتين'; errEl.style.display = 'block'; return; }

  fetch(API + '/auth/change-password', {
    method: 'POST',
    headers: apiHeaders(),
    body: JSON.stringify({new_password: p1})
  })
  .then(function(r) {
    if (!r.ok) throw new Error('fail');
    HAS_CUSTOM_PW = true;
    document.getElementById('pwStatus').textContent = 'كلمة مرور مخصصة';
    sucEl.textContent = 'تم تغيير كلمة المرور بنجاح';
    sucEl.style.display = 'block';
    document.getElementById('pw1').value = '';
    document.getElementById('pw2').value = '';
  })
  .catch(function() { errEl.textContent = 'حدث خطأ في تغيير كلمة المرور'; errEl.style.display = 'block'; });
}

function openSupport() {
  if (SUPPORT_WA) {
    var num = SUPPORT_WA.replace(/[^0-9]/g, '');
    window.open('https://wa.me/' + num, '_blank');
  }
}

/* ── ONBOARD ── */
function saveOnboard() {
  var h = parseInt(document.getElementById('onboardHour').value);
  if (isNaN(h) || h < 0 || h > 23) { alert('يرجى إدخال رقم صحيح بين 0 و 23'); return; }
  fetch(API + '/settings/close-hour', {
    method: 'POST',
    headers: apiHeaders(),
    body: JSON.stringify({close_hour: h})
  })
  .then(function(r) {
    if (!r.ok) throw new Error('fail');
    CLOSE_HOUR = h;
    ONBOARDED = true;
    hideModal('onboardModal');
  })
  .catch(function() { alert('حدث خطأ في الحفظ'); });
}

/* ── PRINT ── */
function doPrint() {
  if (!lastQuarterData) { alert('لا توجد بيانات ضريبية'); return; }
  var d = lastQuarterData;
  var html = '<div class="print-wrap">'
    + '<div class="print-header">'
    + '<h1>' + STORE + '</h1>'
    + '<p>الرقم الضريبي: ' + TAX_NUM + '</p>'
    + '<p>' + (d.period_label || 'الربع الحالي') + '</p>'
    + '</div>'
    + '<table class="print-table">'
    + '<thead><tr><th>البند</th><th>القيمة</th></tr></thead>'
    + '<tbody>'
    + '<tr><td>المبيعات الخاضعة للضريبة</td><td>' + fmt(d.tax_sales) + '</td></tr>'
    + '<tr><td>ضريبة المبيعات (15%)</td><td>' + fmt(d.tax_sales) + '</td></tr>'
    + '<tr><td>المشتريات الخاضعة للضريبة</td><td>' + fmt(d.tax_purchases) + '</td></tr>'
    + '<tr><td>ضريبة المشتريات (15%)</td><td>' + fmt(d.tax_purchases) + '</td></tr>'
    + '<tr><td><strong>صافي المستحق للهيئة</strong></td><td><strong>' + fmt(d.vat_due) + '</strong></td></tr>'
    + '</tbody></table>'
    + '<div class="print-total">المستحق للهيئة: ' + fmt(d.vat_due) + ' ر.س</div>'
    + '<div class="print-footer">تم إنشاء هذا التقرير بواسطة نظام المحاسب الذكي</div>'
    + '</div>';
  document.getElementById('printDoc').innerHTML = html;
  window.print();
}

/* ── ENTER KEY ON LOGIN ── */
document.getElementById('loginPass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginUser').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginPass').focus();
});
</script>
