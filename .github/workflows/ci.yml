name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r api/requirements.txt

    - name: Import smoke test
      run: |
        python -c "import sys; sys.path.append('api'); import main; print('import-ok')"

    - name: Optional deployed healthcheck (skip on failure)
      run: |
        set -e
        if [ -n "${{ secrets.DEPLOYED_HEALTH_URL }}" ]; then
          curl --fail "${{ secrets.DEPLOYED_HEALTH_URL }}" -sS
        else
          echo "No DEPLOYED_HEALTH_URL secret configured; skipping remote healthcheck"
        fi
